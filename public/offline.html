<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · RouteAce</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #f59e0b; display: inline-block; margin-right: 8px;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    p { color: #9ca3af; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
    button {
      background: #16a34a; color: #fff; border: 0; padding: 12px 20px;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    .meta { margin-top: 18px; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <main class="card">
    <div><span class="dot"></span>Offline</div>
    <h1>You're offline</h1>
    <p>RouteAce can't reach the network right now. Your driver and tracking views will continue to work with the data we've cached.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="meta">RouteAce · routeace.app</div>
  </main>
</body>
</html>
