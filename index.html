<!doctype html>

  <head>
    <script>
      // No-flicker theme bootstrap: applies the guest's saved preference (or
      // "dark" by default) before React hydrates so the landing page never
      // flashes light. Signed-in users get their per-user theme applied a
      // moment later by <UserThemeSync />.
      (function () {
        try {
          var t = localStorage.getItem('theme:guest') || 'dark';
          var isDark = t === 'dark' || (t === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
